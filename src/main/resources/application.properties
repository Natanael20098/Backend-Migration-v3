# Application
spring.application.name=homelend-pro
server.port=8080

# Supabase PostgreSQL Connection (Transaction Pooler)
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres
spring.datasource.username=postgres.irwzeeykctvjbmbfsddz
spring.datasource.password=HomeLend2026SecureDb99
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Anti-pattern: open-in-view left on (lazy loading issues)
spring.jpa.open-in-view=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Supabase transaction pooler requires prepareThreshold=0
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JWT
jwt.secret=${JWT_SECRET:homelend-super-secret-key-do-not-share-replace-me}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mailgun
mailgun.api-key=${MAILGUN_API_KEY:placeholder}
mailgun.domain=${MAILGUN_DOMAIN:mg.tallerlabs.ai}

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# SQL init (disabled - schema managed in Supabase directly)
spring.sql.init.mode=never
#spring.sql.init.schema-locations=classpath:schema.sql
#spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=false

# Logging (inconsistent levels)
logging.level.root=INFO
logging.level.com.zcloud.platform=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# HomeLend Pro — Local Development Stack
#
# Runs the Java monolith, FastAPI auth service, nginx gateway, and Next.js
# frontend together. The database (Supabase PostgreSQL) is external and is
# NOT included here — all services connect to it via DATABASE_URL / SPRING_DATASOURCE_URL.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in real values.
#   2. Run the otp_codes migration (see services/auth-service/README.md).
#   3. docker compose up
#
# Usage:
#   docker compose up          # Start all services
#   docker compose up -d       # Start in background
#   docker compose down        # Stop and remove containers
#   docker compose logs -f     # Stream logs
#   docker compose ps          # Show status
#
# Adding a new FastAPI service:
#   1. Create services/<new-service>/ following the pattern in services/README.md
#   2. Add a service block below (copy the auth-service block, update name/port)
#   3. Add an upstream + location block in gateway/nginx.conf
#   4. Re-run: docker compose up --build

version: "3.9"

networks:
  platform:
    driver: bridge

services:

  # ── Java Monolith ────────────────────────────────────────────────────────────
  java-monolith:
    build:
      context: .
      dockerfile: Dockerfile.java
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Map shared env vars to the Spring Boot property names
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - platform
    restart: unless-stopped

  # ── Auth Service (FastAPI) ────────────────────────────────────────────────────
  auth-service:
    build:
      # Context must be ./services so the shared/ module is accessible in the build
      context: ./services
      dockerfile: auth-service/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    networks:
      - platform
    restart: unless-stopped
    # No depends_on — database is external (Supabase)

  # ── API Gateway (nginx) ───────────────────────────────────────────────────────
  gateway:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - java-monolith
      - auth-service
      - property-listing-service
      - closing-service
    networks:
      - platform
    restart: unless-stopped

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bake the gateway URL into the Next.js bundle at build time.
        # The frontend calls the nginx gateway (port 80 = default HTTP).
        NEXT_PUBLIC_API_URL: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - platform
    restart: unless-stopped

  # ── Property & Listing Service (FastAPI) ────────────────────────────────────
  property-listing-service:
    build:
      # Context must be ./services so the shared/ module is accessible in the build
      context: ./services
      dockerfile: property-listing-service/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    networks:
      - platform
    restart: unless-stopped
    # No depends_on — database is external (Supabase)

  # ── Closing Service (FastAPI) ─────────────────────────────────────────────────
  closing-service:
    build:
      # Context must be ./services so the shared/ module is accessible in the build
      context: ./services
      dockerfile: closing-service/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    networks:
      - platform
    restart: unless-stopped
    # No depends_on — database is external (Supabase)

  # ── Template: Adding a New FastAPI Service ────────────────────────────────────
  # Uncomment and customise this block when adding the next migrated service.
  # Also add an upstream + location block in gateway/nginx.conf.
  #
  # new-service:
  #   build:
  #     context: ./services
  #     dockerfile: new-service/Dockerfile
  #   ports:
  #     - "8005:8005"
  #   env_file: .env
  #   networks: [platform]
  #   restart: unless-stopped

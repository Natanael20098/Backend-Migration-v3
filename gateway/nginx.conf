# HomeLend Pro — nginx API Gateway Configuration
#
# Routing table (current state):
#   /api/auth/*  →  auth-service:8001   (FastAPI — migrated)
#   /api/*       →  java-monolith:8080  (Spring Boot — legacy)
#   /*           →  frontend:3000       (Next.js)
#
# Incremental cutover:
#   To route a new service area to FastAPI, add an upstream block and a
#   location block BEFORE the generic "location /api/" block. The more
#   specific prefix takes priority. See gateway/README.md for full instructions.
#
# Smoke validation:
#   After adding a location block, test with:
#     curl -I http://localhost/api/<new-path>
#   Verify the expected HTTP status before deploying to production.
#   See gateway/README.md for the full smoke test checklist.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream definitions ─────────────────────────────────────────────────
    # Add a new upstream block here for each migrated FastAPI service.

    upstream java_monolith {
        server java-monolith:8080;
        keepalive 16;
    }

    upstream auth_service {
        server auth-service:8001;
        keepalive 8;
    }

    # Template: add next service upstream here
    # upstream my_new_service {
    #     server my-service:8002;
    #     keepalive 8;
    # }

    # ── Shared proxy settings ─────────────────────────────────────────────────
    # Included inline because nginx:alpine does not ship proxy_params by default.

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Pass real client information to upstream services
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 required for keepalive connections to upstreams
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # ── Auth routes → FastAPI auth-service ────────────────────────────────
        # IMPORTANT: This block must be declared BEFORE /api/ to take priority
        # when both prefixes match. nginx uses longest-prefix matching, but
        # explicit ordering makes intent clear and avoids future confusion.
        #
        # Cutover status: MIGRATED (auth-service handles all /api/auth/* traffic)
        # Rollback: change proxy_pass to http://java_monolith
        location /api/auth/ {
            proxy_pass http://auth_service;
        }

        # Template: add new service routes here, BEFORE the generic /api/ block.
        # Cutover status: PENDING
        # location /api/properties/ {
        #     proxy_pass http://my_new_service;
        # }

        # ── All other API routes → Java monolith ──────────────────────────────
        # This is the catch-all for all /api/* paths not yet migrated.
        # As more services are migrated, add specific location blocks above
        # to intercept those path prefixes before they reach this block.
        location /api/ {
            proxy_pass http://java_monolith;
        }

        # ── Frontend passthrough ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;

            # WebSocket support for Next.js hot reload (development)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

# HomeLend Pro — nginx API Gateway Configuration
#
# Routing table (current state — all routes served by FastAPI microservices):
#   /api/auth/*        →  auth-service:8001              (FastAPI)
#   /api/properties/*  →  property-listing-service:8002  (FastAPI)
#   /api/listings/*    →  property-listing-service:8002  (FastAPI)
#   /api/loans/*       →  underwriting-service:8003       (FastAPI — sub-resources only)
#   /api/closings/*    →  closing-service:8004            (FastAPI)
#   /api/clients/*     →  client-crm-service:8005         (FastAPI)
#   /api/agents/*      →  client-crm-service:8005         (FastAPI)
#   /api/brokerages/*  →  client-crm-service:8005         (FastAPI)
#   /api/leads/*       →  client-crm-service:8005         (FastAPI)
#   /api/showings/*    →  client-crm-service:8005         (FastAPI)
#   /api/offers/*      →  client-crm-service:8005         (FastAPI)
#   /*                 →  frontend:3000                   (Next.js)
#
# Note: /api/admin/* is not routed — the admin domain is deferred to a future
# wave and will return 404 until a dedicated admin-service is built.
# Note: /api/loans/* base CRUD (loan origination) is not yet migrated (Wave 2B
# deferred). Requests to non-existent loan endpoints return 404 from FastAPI.
#
# Adding a new FastAPI service:
#   1. Add an upstream block in the http {} section below.
#   2. Add a location block in the server {} section.
#   3. Add the service to docker-compose.yml and gateway depends_on.
#   4. See gateway/README.md for full instructions.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream definitions ─────────────────────────────────────────────────

    upstream auth_service {
        server auth-service:8001;
        keepalive 8;
    }

    upstream property_listing_service {
        server property-listing-service:8002;
        keepalive 8;
    }

    upstream underwriting_service {
        server underwriting-service:8003;
        keepalive 8;
    }

    upstream closing_service {
        server closing-service:8004;
        keepalive 8;
    }

    upstream client_crm_service {
        server client-crm-service:8005;
        keepalive 8;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Pass real client information to upstream services
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 required for keepalive connections to upstreams
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # ── Auth routes → FastAPI auth-service ────────────────────────────────
        # Cutover status: MIGRATED
        location /api/auth/ {
            proxy_pass http://auth_service;
        }

        # ── Property/Listing routes → FastAPI property-listing-service ────────
        # Cutover status: MIGRATED
        location /api/properties/ {
            proxy_pass http://property_listing_service;
        }

        location /api/listings/ {
            proxy_pass http://property_listing_service;
        }

        # ── Loan sub-resource routes → FastAPI underwriting-service ───────────
        # Cutover status: MIGRATED (credit-report, underwriting, appraisal sub-paths)
        # Note: base loan CRUD (/api/loans, POST /api/loans, etc.) is Wave 2B
        # (loan-origination-service, not yet built). Those paths return 404.
        location /api/loans/ {
            proxy_pass http://underwriting_service;
        }

        # ── Closing routes → FastAPI closing-service ──────────────────────────
        # Cutover status: MIGRATED
        location /api/closings/ {
            proxy_pass http://closing_service;
        }

        # ── Client CRM routes → FastAPI client-crm-service ───────────────────
        # Cutover status: MIGRATED
        location /api/clients/ {
            proxy_pass http://client_crm_service;
        }

        location /api/agents/ {
            proxy_pass http://client_crm_service;
        }

        location /api/brokerages/ {
            proxy_pass http://client_crm_service;
        }

        location /api/leads/ {
            proxy_pass http://client_crm_service;
        }

        location /api/showings/ {
            proxy_pass http://client_crm_service;
        }

        location /api/offers/ {
            proxy_pass http://client_crm_service;
        }

        # ── Frontend passthrough ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;

            # WebSocket support for Next.js hot reload (development)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
